<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogMan - Developer Console</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Droid Sans Mono', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      background: #2d2d30;
      border-bottom: 1px solid #3e3e42;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 40px;
      font-size: 13px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .toolbar-title {
      font-weight: 600;
      color: #cccccc;
    }

    .toolbar-stats {
      display: flex;
      gap: 16px;
      color: #9cdcfe;
      font-size: 12px;
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
    }

    .toolbar-btn {
      background: #3c3c3c;
      border: 1px solid #464647;
      color: #cccccc;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .toolbar-btn:hover {
      background: #404040;
      border-color: #5a5a5a;
    }

    .toolbar-btn.active {
      background: #0e639c;
      border-color: #007acc;
      color: white;
    }

    .main-container {
      display: flex;
      height: calc(100vh - 40px);
    }

    .requests-panel {
      width: 350px;
      background: #252526;
      border-right: 1px solid #3e3e42;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      background: #2d2d30;
      padding: 8px 12px;
      border-bottom: 1px solid #3e3e42;
      font-size: 12px;
      font-weight: 600;
      color: #cccccc;
    }

    .requests-list {
      flex: 1;
      overflow-y: auto;
    }

    .request-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #2d2d30;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 12px;
    }

    .request-item:hover {
      background: #2a2d2e;
    }

    .request-item.selected {
      background: #094771;
      border-left: 3px solid #007acc;
    }

    .request-item.new {
      animation: highlight 2s ease-out;
    }

    @keyframes highlight {
      0% {
        background: #1e3a8a;
      }

      100% {
        background: transparent;
      }
    }

    .request-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .request-status.active {
      background: #4ade80;
    }

    .request-status.completed {
      background: #6b7280;
    }

    .request-status.error {
      background: #ef4444;
    }

    .request-details {
      flex: 1;
      min-width: 0;
    }

    .request-title {
      color: #cccccc;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .request-method {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      margin-right: 6px;
      min-width: 40px;
      text-align: center;
    }

    .method-GET {
      background: #4ade80;
      color: #000;
    }

    .method-POST {
      background: #fbbf24;
      color: #000;
    }

    .method-PUT {
      background: #3b82f6;
      color: #fff;
    }

    .method-DELETE {
      background: #ef4444;
      color: #fff;
    }

    .method-PATCH {
      background: #8b5cf6;
      color: #fff;
    }

    .method-RAILS {
      background: #dc2626;
      color: #fff;
    }

    .method-API {
      background: #059669;
      color: #fff;
    }

    .method-WEB {
      background: #6b7280;
      color: #fff;
    }

    .method-LOG {
      background: #374151;
      color: #fff;
    }

    .method-UNKNOWN {
      background: #1f2937;
      color: #9ca3af;
    }

    .request-path {
      color: #9cdcfe;
      font-size: 11px;
      font-weight: normal;
    }

    .request-id {
      color: #6a9955;
      font-weight: 400;
      font-size: 10px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.7;
    }

    .request-meta {
      display: flex;
      justify-content: space-between;
      color: #6a9955;
      font-size: 11px;
    }

    .entry-count {
      color: #ce9178;
      font-weight: 500;
    }

    .details-panel {
      flex: 1;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
    }

    .details-header {
      background: #2d2d30;
      padding: 12px 16px;
      border-bottom: 1px solid #3e3e42;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .details-title {
      font-size: 13px;
      font-weight: 600;
      color: #cccccc;
    }

    .details-id {
      font-family: 'SF Mono', monospace;
      color: #9cdcfe;
      font-size: 11px;
      background: #3c3c3c;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .details-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .log-entry {
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #262626;
      border-radius: 4px;
      border-left: 3px solid #007acc;
      font-size: 12px;
      line-height: 1.4;
    }

    .log-entry:last-child {
      border-left-color: #4ade80;
      background: #1a2e1a;
    }

    .log-content {
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 6px;
    }

    .log-timestamp {
      color: #6a9955;
      font-size: 10px;
      text-align: right;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #6a9955;
      font-size: 14px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9cdcfe;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #3c3c3c;
      border-top: 2px solid #007acc;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4ade80;
      font-size: 11px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    /* Custom scrollbar for webkit browsers */
    .requests-list::-webkit-scrollbar,
    .details-content::-webkit-scrollbar {
      width: 8px;
    }

    .requests-list::-webkit-scrollbar-track,
    .details-content::-webkit-scrollbar-track {
      background: #1e1e1e;
    }

    .requests-list::-webkit-scrollbar-thumb,
    .details-content::-webkit-scrollbar-thumb {
      background: #3c3c3c;
      border-radius: 4px;
    }

    .requests-list::-webkit-scrollbar-thumb:hover,
    .details-content::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }

    .filter-section {
      padding: 8px 12px;
      border-bottom: 1px solid #3e3e42;
      background: #2d2d30;
    }

    .filter-input {
      width: 100%;
      background: #3c3c3c;
      border: 1px solid #464647;
      color: #d4d4d4;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-family: inherit;
    }

    .filter-input:focus {
      outline: none;
      border-color: #007acc;
      box-shadow: 0 0 0 1px #007acc;
    }

    .filter-input::placeholder {
      color: #6a9955;
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-title">🚀 LogMan - Developer Console</div>
      <div class="toolbar-stats">
        <span>Requests: <span id="totalRequests">0</span></span>
        <span>Entries: <span id="totalEntries">0</span></span>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn" onclick="refreshData()">
        <span id="refreshIcon">⟲</span> Refresh
      </button>
      <button class="toolbar-btn" onclick="clearAll()">🗑 Clear</button>
      <button class="toolbar-btn active" id="autoScrollBtn" onclick="toggleAutoScroll()">
        📜 Auto Scroll
      </button>
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span>Live</span>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="requests-panel">
      <div class="panel-header">
        Requests (<span id="requestCount">0</span>)
      </div>

      <div class="filter-section">
        <input type="text" class="filter-input" placeholder="Filter by method, path, or request ID..." id="filterInput"
          oninput="filterRequests(this.value)">
      </div>

      <div class="requests-list" id="requestsList">
        <div class="loading">
          <div class="loading-spinner"></div>
          Loading requests...
        </div>
      </div>
    </div>

    <div class="details-panel">
      <div class="details-header">
        <div class="details-title">Request Details</div>
        <div class="details-id" id="selectedRequestId">Select a request</div>
      </div>

      <div class="details-content" id="detailsContent">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div>Select a request from the left panel to view its logs</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentData = null;
    let selectedRequestId = null;
    let autoScroll = true;
    let filteredRequests = [];

    // Initialize the app
    async function initializeApp() {
      try {
        currentData = await window.electronAPI.getLogData();
        updateRequestsList(currentData);

        window.electronAPI.onLogDataUpdate((data) => {
          const isNewData = !currentData || data.totalRequests > currentData.totalRequests;
          currentData = data;
          updateRequestsList(data, isNewData);

          // Update details if a request is selected
          if (selectedRequestId) {
            updateRequestDetails(selectedRequestId);
          }
        });

        console.log('LogMan Console initialized successfully');
      } catch (error) {
        console.error('Failed to initialize LogMan:', error);
        showError('Failed to connect to log monitoring service');
      }
    }

    function updateRequestsList(data, isNewData = false) {
      const requestsList = document.getElementById('requestsList');
      const totalRequestsEl = document.getElementById('totalRequests');
      const totalEntriesEl = document.getElementById('totalEntries');
      const requestCountEl = document.getElementById('requestCount');

      // Update stats
      const totalEntries = data.requests.reduce((sum, req) => sum + req.entriesCount, 0);
      totalRequestsEl.textContent = data.totalRequests;
      totalEntriesEl.textContent = totalEntries;
      requestCountEl.textContent = data.totalRequests;

      if (data.totalRequests === 0) {
        requestsList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <div>No requests detected yet</div>
          </div>
        `;
        return;
      }

      // Sort requests by last seen (most recent first)
      const sortedRequests = [...data.requests].sort((a, b) =>
        new Date(b.lastSeen) - new Date(a.lastSeen)
      );

      // Apply filter if active
      const filterValue = document.getElementById('filterInput').value.toLowerCase();
      filteredRequests = filterValue
        ? sortedRequests.filter(req =>
          req.requestId.toLowerCase().includes(filterValue) ||
          req.method.toLowerCase().includes(filterValue) ||
          req.path.toLowerCase().includes(filterValue) ||
          req.title.toLowerCase().includes(filterValue)
        )
        : sortedRequests;

      requestsList.innerHTML = filteredRequests.map(request => {
        const isSelected = selectedRequestId === request.requestId;
        const isNew = isNewData && request.entriesCount === 1;
        const timeDiff = new Date() - new Date(request.lastSeen);
        const status = timeDiff < 30000 ? 'active' : 'completed';

        return `
          <div class="request-item ${isSelected ? 'selected' : ''} ${isNew ? 'new' : ''}"
               onclick="selectRequest('${request.requestId}')">
            <div class="request-status ${status}"></div>
            <div class="request-details">
              <div class="request-title">
                <span class="request-method method-${request.method}">${request.method}</span>
                <span class="request-path">${escapeHtml(request.path)}</span>
              </div>
              <div class="request-id">${request.requestId}</div>
              <div class="request-meta">
                <span class="entry-count">${request.entriesCount} entries</span>
                <span>${new Date(request.lastSeen).toLocaleTimeString()}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectRequest(requestId) {
      selectedRequestId = requestId;

      // Update visual selection
      document.querySelectorAll('.request-item').forEach(item => {
        item.classList.remove('selected');
      });
      event.currentTarget.classList.add('selected');

      updateRequestDetails(requestId);
    }

    function updateRequestDetails(requestId) {
      const detailsContent = document.getElementById('detailsContent');
      const selectedRequestIdEl = document.getElementById('selectedRequestId');

      if (!currentData) return;

      const request = currentData.requests.find(req => req.requestId === requestId);
      if (!request) {
        detailsContent.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">❌</div>
            <div>Request not found</div>
          </div>
        `;
        return;
      }

      selectedRequestIdEl.textContent = requestId;

      detailsContent.innerHTML = request.entries.map((entry, index) => `
        <div class="log-entry">
          <div class="log-content">${escapeHtml(entry.content)}</div>
          <div class="log-timestamp">${new Date(entry.timestamp).toLocaleString()}</div>
        </div>
      `).join('');

      // Auto-scroll to bottom if enabled
      if (autoScroll) {
        detailsContent.scrollTop = detailsContent.scrollHeight;
      }
    }

    function filterRequests(value) {
      if (currentData) {
        updateRequestsList(currentData);
      }
    }

    function refreshData() {
      const refreshIcon = document.getElementById('refreshIcon');
      refreshIcon.style.animation = 'spin 1s linear infinite';

      setTimeout(() => {
        refreshIcon.style.animation = '';
      }, 1000);

      if (currentData) {
        updateRequestsList(currentData);
      }
    }

    function clearAll() {
      if (confirm('Clear the display? This won\'t affect the actual log data.')) {
        selectedRequestId = null;
        document.getElementById('requestsList').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <div>No requests detected yet</div>
          </div>
        `;
        document.getElementById('detailsContent').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <div>Select a request from the left panel to view its logs</div>
          </div>
        `;
        document.getElementById('selectedRequestId').textContent = 'Select a request';
        document.getElementById('totalRequests').textContent = '0';
        document.getElementById('totalEntries').textContent = '0';
        document.getElementById('requestCount').textContent = '0';
      }
    }

    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      const btn = document.getElementById('autoScrollBtn');
      btn.classList.toggle('active', autoScroll);
      btn.innerHTML = autoScroll ? '📜 Auto Scroll' : '⏸️ Manual';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showError(message) {
      document.getElementById('requestsList').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div style="color: #ef4444;">${message}</div>
          <button class="toolbar-btn" onclick="location.reload()" style="margin-top: 12px;">Retry</button>
        </div>
      `;
    }

    // Initialize when the page loads
    document.addEventListener('DOMContentLoaded', initializeApp);

    // Cleanup when page unloads
    window.addEventListener('beforeunload', () => {
      if (window.electronAPI && window.electronAPI.removeAllListeners) {
        window.electronAPI.removeAllListeners();
      }
    });
  </script>
</body>

</html>
