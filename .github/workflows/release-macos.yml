name: Release macOS build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Validate release metadata
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v0.5.0"
            exit 1
          fi

          version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"

          if [ "${package_version}" != "${version}" ]; then
            echo "::error::Tag ${tag} does not match package.json version ${package_version}"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish macOS release with Electron Forge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip
          if-no-files-found: error
